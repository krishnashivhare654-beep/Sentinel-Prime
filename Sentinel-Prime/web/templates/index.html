<!DOCTYPE html>
<html>
<head>
    <title>SENTINEL PRIME // CMD_HUD</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00f2fe; --bg: #050505; --card: #0a0a0c; --alert: #ff3131; --warning: #ffae00; --success: #39ff14; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; margin: 0; overflow-x: hidden; }
        
        /* Header & Buttons */
        .header { border-bottom: 2px solid var(--neon); padding: 15px 0; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 10px; }
        
        .btn { background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; padding: 10px 15px; font-family: monospace; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .btn-report { border-color: var(--success); color: var(--success); }
        .btn-report:hover { background: var(--success); color: #000; box-shadow: 0 0 15px var(--success); }

        /* Dashboard Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { background: var(--card); border: 1px solid #1a1a1a; padding: 20px; border-radius: 5px; position: relative; }
        
        #alert-banner { display:none; background: rgba(255, 49, 49, 0.15); border: 1px solid var(--alert); padding: 12px; color: var(--alert); font-weight: bold; margin-bottom: 20px; text-align: center; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 49, 49, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 49, 49, 0); } 100% { box-shadow: 0 0 0 0px rgba(255, 49, 49, 0); } }

        /* Risk Tags */
        .risk-tag { padding: 3px 8px; border-radius: 3px; font-size: 10px; font-weight: bold; margin-left: 10px; display: inline-block; }
        .CRITICAL { background: var(--alert); color: white; }
        .HIGH { background: #ff5e00; color: white; }
        .MEDIUM { background: var(--warning); color: black; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        th { text-align: left; color: #666; border-bottom: 1px solid #222; padding: 10px 5px; text-transform: uppercase; }
        td { padding: 10px 5px; border-bottom: 1px solid #111; color: #aaa; }
        
        input { background: #000; border: 1px solid #333; color: var(--neon); padding: 10px; width: 85%; margin-bottom: 12px; outline: none; font-family: monospace; }
        canvas { max-height: 200px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="letter-spacing: 5px; margin:0;">SENTINEL PRIME // V2.3</h1>
        <div class="btn-group">
            <!-- Naya Download Report Button -->
            <button class="btn btn-report" onclick="window.location.href='/api/download_report'">
                >_ DOWNLOAD_REPORT.PDF
            </button>
            <button class="btn" onclick="fetch('/api/scan')">
                >_ INITIATE_SCAN
            </button>
        </div>
    </div>

    <!-- Watchtower Threat Alert -->
    <div id="alert-banner">⚠️ CRITICAL_THREAT_DETECTED: <span id="alert-msg"></span></div>

    <div class="grid">
        <!-- Vault-X Encryption -->
        <div class="box">
            <h2 style="color:#fff; margin-top:0;">>_ VAULT_X (AES-256)</h2>
            <input type="text" id="file-path" placeholder="FULL_FILE_PATH (e.g. C:/data/secret.txt)">
            <input type="password" id="file-pass" placeholder="SECRET_ENCRYPTION_KEY">
            <div style="margin-top: 10px;">
                <button class="btn" onclick="vaultAction('encrypt')">ENCRYPT</button>
                <button class="btn" onclick="vaultAction('decrypt')" style="border-color:var(--alert); color:var(--alert);">DECRYPT</button>
            </div>
        </div>

        <!-- Vulnerability Intel -->
        <div class="box">
            <h2 style="color:#fff; margin-top:0;">>_ VULNERABILITY_INTELLIGENCE</h2>
            <div id="risk-list" style="max-height: 180px; overflow-y: auto;">
                <p style="color:#444;">Analyzing network nodes...</p>
            </div>
        </div>

        <!-- Analytics Chart -->
        <div class="box">
            <h2 style="color:#fff; margin-top:0;">>_ TRAFFIC_ANALYTICS</h2>
            <canvas id="protocolChart"></canvas>
        </div>

        <!-- Devices List -->
        <div class="box">
            <h2 style="margin-top:0;">>_ DISCOVERED_DEVICES</h2>
            <div style="max-height: 220px; overflow-y: auto;">
                <table>
                    <thead><tr><th>IP_ADDR</th><th>STATUS</th><th>OPEN_PORTS</th></tr></thead>
                    <tbody id="devices"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Live Stream Footer -->
    <div class="box" style="margin-top:25px;">
        <h2 style="margin-top:0;">>_ LIVE_PACKET_STREAM</h2>
        <div style="max-height: 300px; overflow-y: auto;">
            <table>
                <thead><tr><th>TIME</th><th>SOURCE_IP</th><th>DESTINATION_IP</th><th>PROTO</th></tr></thead>
                <tbody id="traffic"></tbody>
            </table>
        </div>
    </div>

    <script>
        let protocolChart;

        function vaultAction(type) {
            const path = document.getElementById('file-path').value;
            const password = document.getElementById('file-pass').value;
            if(!path || !password) return alert("Error: Path and Password required.");
            
            fetch(`/api/vault/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({path, password})
            }).then(r => r.json()).then(d => alert(d.message));
        }

        function updateUI() {
            // Fetch Live Traffic
            fetch('/api/traffic').then(r => r.json()).then(data => {
                document.getElementById('traffic').innerHTML = data.map(x => `
                    <tr><td>${x.timestamp.split(' ')[1]}</td><td>${x.src_ip}</td><td>${x.dst_ip}</td><td>${x.protocol}</td></tr>
                `).join('');
            });

            // Fetch Discovered Devices
            fetch('/api/devices').then(r => r.json()).then(data => {
                document.getElementById('devices').innerHTML = data.map(x => `
                    <tr><td style="color:var(--neon)">${x.ip}</td><td style="color:var(--success)">ONLINE</td><td style="color:var(--warning)">${x.ports || 'SCANNING...'}</td></tr>
                `).join('');
            });

            // Update Chart Stats
            fetch('/api/stats').then(r => r.json()).then(data => {
                if(protocolChart) {
                    protocolChart.data.datasets[0].data = [data.TCP||0, data.UDP||0, data.ICMP||0];
                    protocolChart.update();
                }
            });

            // Watchtower Alert Detection
            fetch('/api/alerts').then(r => r.json()).then(data => {
                const banner = document.getElementById('alert-banner');
                if(data.length > 0) {
                    banner.style.display = 'block';
                    document.getElementById('alert-msg').innerText = data[0].msg;
                } else {
                    banner.style.display = 'none';
                }
            });

            // Risk Assessment Display
            fetch('/api/risk_assessment').then(r => r.json()).then(data => {
                let html = "";
                data.forEach(dev => {
                    if(dev.threats && dev.threats.length > 0) {
                        dev.threats.forEach(t => {
                            html += `<div style="margin-bottom:12px; border-left: 3px solid var(--alert); padding-left:12px;">
                                        <span style="color:#fff; font-size:13px;">${dev.ip}</span> 
                                        <span class="risk-tag ${t.level}">${t.level}</span><br>
                                        <small style="color:#666;">Targeting: ${t.info}</small>
                                     </div>`;
                        });
                    }
                });
                document.getElementById('risk-list').innerHTML = html || '<p style="color:var(--success)">System integrity verified. No critical risks.</p>';
            });
        }

        // Initialize Chart.js
        const ctx = document.getElementById('protocolChart').getContext('2d');
        protocolChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['TCP', 'UDP', 'ICMP'],
                datasets: [{
                    data: [0, 0, 0],
                    backgroundColor: ['#00f2fe', '#7117ea', '#ff3131'],
                    borderColor: '#0a0a0c',
                    borderWidth: 2
                }]
            },
            options: { 
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#00f2fe', font: { family: 'monospace', size: 10 } } } } 
            }
        });

        // Loop UI Updates
        setInterval(updateUI, 3000);
        updateUI();
    </script>
</body>
</html>
