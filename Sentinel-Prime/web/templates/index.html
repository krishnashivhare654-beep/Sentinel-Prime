<!DOCTYPE html>
<html>
<head>
    <title>SENTINEL PRIME // HUD</title>
    <style>
        :root { --neon: #00f2fe; --bg: #050505; --card: #0a0a0c; }
        body { background: var(--bg); color: var(--neon); font-family: monospace; padding: 20px; }
        .header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { background: var(--card); border: 1px solid #1a1a1a; padding: 15px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { text-align: left; color: #555; border-bottom: 1px solid #222; }
        td { padding: 6px 0; border-bottom: 1px solid #111; }
        .btn { background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; padding: 5px 10px; }
        .btn:hover { background: var(--neon); color: #000; }
        .risk-low { color: #39ff14; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 1.2rem; font-weight: bold;">SENTINEL PRIME // COMMAND_CENTER</div>
        <button class="btn" onclick="triggerScan()">START_NETWORK_SCAN</button>
    </div>

    <div class="grid">
        <div class="box">
            <h2>>_ LIVE_TRAFFIC_LOGS</h2>
            <table>
                <thead><tr><th>TIME</th><th>SRC</th><th>DST</th><th>PROTO</th><th>RISK</th></tr></thead>
                <tbody id="traffic-body"></tbody>
            </table>
        </div>

        <div class="box">
            <h2>>_ DISCOVERED_DEVICES</h2>
            <table>
                <thead><tr><th>IP</th><th>HOSTNAME</th><th>STATUS</th><th>PORTS</th></tr></thead>
                <tbody id="device-body"></tbody>
            </table>
            <h2 style="margin-top:20px;">>_ PROTOCOL_STATS</h2>
            <pre id="stats-json" style="font-size: 14px; color:#888;"></pre>
        </div>
    </div>

    <script>
        function triggerScan() {
            fetch('/api/scan').then(r => r.json()).then(d => alert(d.status));
        }

        function updateUI() {
            // Update Traffic
            fetch('/api/traffic').then(r => r.json()).then(data => {
                let html = "";
                data.forEach(x => html += `<tr><td>${x.timestamp.split(' ')[1]}</td><td>${x.src_ip}</td><td>${x.dst_ip}</td><td>${x.protocol}</td><td class="risk-low">${x.risk_level}</td></tr>`);
                document.getElementById('traffic-body').innerHTML = html;
            });

            // Update Devices
            fetch('/api/devices').then(r => r.json()).then(data => {
                let html = "";
                data.forEach(x => html += `<tr><td>${x.ip}</td><td>${x.hostname || 'NA'}</td><td style="color:#39ff14">UP</td><td style="color:#ffae00">${x.ports}</td></tr>`);
                document.getElementById('device-body').innerHTML = html;
            });

            // Update Stats
            fetch('/api/stats').then(r => r.json()).then(data => {
                document.getElementById('stats-json').innerHTML = JSON.stringify(data, null, 2);
            });
        }

        setInterval(updateUI, 3000);
        updateUI();
    </script>
</body>
</html>
