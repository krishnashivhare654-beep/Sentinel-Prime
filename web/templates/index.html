<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel Prime // Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #050505; color: #00f2ff; font-family: 'Courier New', monospace; }
        .card { background-color: #0a0a0a; border: 1px solid #00f2ff; border-radius: 0; margin-bottom: 20px; }
        .card-header { border-bottom: 1px solid #00f2ff; font-weight: bold; }
        footer { border-top: 1px solid #333; margin-top: 50px; padding: 30px; background: #0a0a0a; }
        footer a { color: #00f2ff; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-black border-bottom border-info p-3">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1 text-info">SENTINEL PRIME // V2.3</span>
        <span class="badge bg-success">SYSTEM ONLINE</span>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">>_ VAULT_X (AES-256)</div>
                <div class="card-body">
                    <input type="text" class="form-control bg-dark text-info border-secondary mb-2" placeholder="FILE_PATH">
                    <button class="btn btn-outline-info btn-sm">ENCRYPT</button>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">>_ DARKWEB_MONITOR</div>
                <div class="card-body" id="darkweb-logs">
                    <p class="text-warning">Scanning for data leaks...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="text-center">
    <p>Developed by <strong>Krishna Shivhare</strong> | B.Tech CSE (Cyber Security)</p>
    <div class="links">
        <a href="https://github.com/krishnashivhare654-beep" target="_blank">GitHub</a> |
        <a href="https://www.coursera.org/account/accomplishments" target="_blank">Certifications</a>
    </div>
    <p class="small text-muted mt-2">Projects: ShadowTrace & Sentinel Prime</p>
</footer>

</body>
</html>
