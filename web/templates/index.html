<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Sentinel Prime // Active Suite</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root { --neon-green: #00ff41; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: var(--neon-green); font-family: 'Segoe UI', sans-serif; }
        .card { background-color: #0a0a0a; border: 1px solid var(--neon-green); margin-bottom: 20px; transition: 0.3s; }
        .card:hover { transform: scale(1.01); box-shadow: 0 0 15px rgba(0,255,65,0.2); }
        .navbar { border-bottom: 1px solid var(--neon-green); }
        footer { padding: 40px; border-top: 1px solid #333; margin-top: 50px; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg p-3">
    <div class="container">
        <span class="navbar-brand text-success fw-bold">SENTINEL PRIME v2.5</span>
        <div class="d-flex">
            <button class="btn btn-outline-success btn-sm me-2" onclick="startScan()">INITIATE SCAN</button>
            <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#contactModal">CONTACT</button>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row g-4">
        <!-- VAULT_X REAL WORKER -->
        <div class="col-md-6">
            <div class="card p-4">
                <h5>>_ VAULT_X (AES-256)</h5>
                <p class="small text-secondary">Upload file to lock/unlock</p>
                <input type="file" id="targetFile" class="form-control bg-dark text-success border-secondary mb-2">
                <input type="password" id="vaultKey" class="form-control bg-dark text-success border-secondary mb-3" placeholder="SECRET_KEY">
                <div class="d-flex">
                    <button class="btn btn-success me-2 w-100" onclick="handleVault('encrypt')">LOCK FILE</button>
                    <button class="btn btn-outline-danger w-100" onclick="handleVault('decrypt')">UNLOCK</button>
                </div>
                <div id="vStatus" class="mt-3 small"></div>
            </div>
        </div>

        <div class="col-md-6 text-center">
            <div class="card p-4 h-100">
                <h5>>_ TRAFFIC_ANALYTICS</h5>
                <canvas id="trafficChart" style="max-height: 150px;"></canvas>
            </div>
        </div>

        <div class="col-md-12">
            <div class="card p-4">
                <h5>>_ SCAN_RESULTS</h5>
                <table class="table table-dark table-borderless small">
                    <thead><tr><th>IP_ADDR</th><th>STATUS</th><th>PORTS</th><th>RISK</th></tr></thead>
                    <tbody id="scanTable">
                        <tr><td colspan="4" class="text-center text-secondary">No active scan</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="contactModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content bg-dark border-success">
    <div class="modal-body text-center text-success"><h4>📞 +91 9351069427</h4><p>Instagram: @s_krish09</p></div>
</div></div></div>

<footer>© 2026 Sentinel Prime | Krishna Shivhare | VIT Bhopal University</footer>

<script>
async function handleVault(op) {
    const file = document.getElementById('targetFile').files[0];
    const pass = document.getElementById('vaultKey').value;
    const status = document.getElementById('vStatus');

    if(!file || !pass) { status.innerText = "Error: File/Key missing!"; return; }
    
    status.innerText = "Processing...";
    const formData = new FormData();
    formData.append('file', file);
    formData.append('password', pass);
    formData.append('operation', op);

    const response = await fetch('/api/vault', { method: 'POST', body: formData });
    
    if(response.ok) {
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = op === 'encrypt' ? "LOCKED_" + file.name : "UNLOCKED_" + file.name;
        document.body.appendChild(a); a.click(); a.remove();
        status.innerText = "Success! File downloaded.";
    } else {
        status.innerText = "Error: Invalid Key or File!";
    }
}

async function startScan() {
    const table = document.getElementById('scanTable');
    table.innerHTML = '<tr><td colspan="4" class="text-center text-info">Scanning Subnet...</td></tr>';
    const res = await fetch('/api/scan');
    const data = await res.json();
    table.innerHTML = data.devices.map(d => `<tr><td>${d.ip}</td><td class="text-success">${d.status}</td><td>${d.ports}</td><td><span class="badge bg-warning text-dark">${d.risk}</span></td></tr>`).join('');
}

const ctx = document.getElementById('trafficChart').getContext('2d');
new Chart(ctx, { type: 'doughnut', data: { labels: ['TCP', 'UDP'], datasets: [{ data: [80, 20], backgroundColor: ['#00ff41', '#008f11'] }] }, options: { plugins: { legend: { display: false } } } });
</script>
</body>
</html>
